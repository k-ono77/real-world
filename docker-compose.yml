services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: conduit_db
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-migrate:
    build:
      context: .
      dockerfile: backend.Dockerfile
    environment:
      DATABASE_URL: "postgres://user:password@db:5432/conduit_db"
    command: ["npx", "drizzle-kit", "push"]
    depends_on:
      db:
        condition: service_healthy
    restart: no

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "5001:5000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgres://user:password@db:5432/conduit_db"
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
    command: ["npm", "run", "dev"]
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5001
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    depends_on:
      - backend

volumes:
  db-data: